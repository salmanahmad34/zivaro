<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#3b82f6" />
    
    <!-- Performance Preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Primary SEO Metadata -->
    <title>HustiQ | Local Student Gig & Staffing Platform</title>
    <meta name="title" content="HustiQ | Local Student Gig & Staffing Platform" />
    <meta name="description" content="HustiQ connects local cafes, retail shops, and event organizers with verified students for flexible, short-term shifts and gigs nearby. Secure and instant payouts." />
    <meta name="keywords" content="student jobs, local gigs, part time work, shift work, cafe staffing, event staff, micro job, hourly pay, HustiQ, Navi Mumbai" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook Previews -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hustiq.co/" />
    <meta property="og:title" content="HustiQ | Local Student Gig & Staffing Platform" />
    <meta property="og:description" content="Instantly connect with verified local students for short-term help, or earn flexible payouts around your college schedule." />
    <meta property="og:image" content="https://hustiq.co/og-preview.png" />

    <!-- Twitter Cards -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://hustiq.co/" />
    <meta property="twitter:title" content="HustiQ | Local Student Gig & Staffing Platform" />
    <meta property="twitter:description" content="Instantly connect with verified local students for short-term help, or earn flexible payouts around your college schedule." />
    <meta property="twitter:image" content="https://hustiq.co/og-preview.png" />

    <!-- iOS App Styling Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HustiQ" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
